version: '3.8'

services:
  # Готовый браузер (скачается быстро, собирать не нужно)
  chrome_server:
    image: selenium/standalone-chrome:latest
    shm_size: 2gb
    ports:
      - "4444:4444"

  # Твой код
  ui_tests:
    image: ui:v1
    depends_on:
      - chrome_server
    environment:
      - SELENIUM_REMOTE_URL=http://chrome_server:4444/wd/hub
      # Прокидываем твои логины/пароли
      - ADMIN_LOGIN=${ADMIN_LOGIN}
      - FRIEND_LOGIN=${FRIEND_LOGIN}
      - TOKEN=${TOKEN}
      - CHAT_ID=${CHAT_ID}
    volumes:
      - .:/usr/workspace
    command: pytest -sv --alluredir=report